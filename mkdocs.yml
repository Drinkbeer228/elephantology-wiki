site_name: "Энциклопедия «Слонология»"
site_description: "Глубокая интерактивная база знаний по биологии, анатомии, этологии, эволюции и ветеринарии слонов."
site_author: "Elephantology Wiki Team"
site_url: "https://Drinkbeer228.github.io/elephantology-wiki/"
repo_url: "https://github.com/Drinkbeer228/elephantology-wiki"
repo_name: "Drinkbeer228/elephantology-wiki"
copyright: "Copyright © 2026 Энциклопедия «Слонология»"

theme:
  name: material
  language: ru
  palette:
    - scheme: slate
      primary: indigo
      accent: light blue
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - footnotes
  - meta
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang: [ru, en]

extra_css:
  - stylesheets/extra.css?v=9


nav:
  - Главная: index.md
  - Анатомия:
    - Обзор: anatomy/index.md
    - Сердечно-сосудистая система: anatomy/cardiovascular.md
    - Пищеварительная система: anatomy/digestive_system.md
    - Покровная система: anatomy/integumentary_system.md
    - Мышечный гидростат: anatomy/muscular_hydrostat.md
    - Дыхательная система: anatomy/respiratory_system.md
    - Череп: anatomy/skeletal_system_cranial.md
    - Конечности: anatomy/skeletal_system_appendicular.md
    - Мочеполовая система: anatomy/urogenital_system.md
  - Этограмма и поведение:
    - Обзор: ethogram/index.md
    - Когнитивная архитектура и самосознание: ethogram/cognitive_architecture.md
    - Сейсмическая коммуникация: ethogram/seismic_communication.md
    - Акустические паттерны: ethogram/acoustic_patterns.md
    - Агрессивные паттерны: ethogram/aggression_patterns.md
    - Социальные паттерны: ethogram/social_patterns.md
    - Социальная матрица и иерархия: ethogram/social_matrix_hierarchy.md
    - Индивидуальные имена и вокальное обучение: ethogram/individual_names_vocal_learning.md
  - Таксономия и эволюция:
    - Обзор: taxonomy/index.md
    - Таксономия, эволюция и вымершие родственники: taxonomy/taxonomy_evolution.md
  - Ветеринария и уход:
    - Обзор: veterinary/index.md
    - Протокол ухода за стопами: veterinary/foot_care_protocol.md
    - Экстренные схемы лечения EEHV: veterinary/eehv_protocol.md
    - Выхаживание и реабилитация слонят-сирот: veterinary/orphan_calf_rehabilitation.md
  - Экология и социальная психология:
    - Обзор: ecology/index.md
    - ПТСР и синдром «Elephant Breakdown»: ecology/elephant_breakdown_syndrome.md
    - Онтогенез и жизненный цикл слонов: ecology/ontogeny_life_cycle.md
    - Генетика популяций и фрагментация ареалов: ecology/population_genetics.md
    - Конфликт человека и слона (HEC): ecology/human_elephant_conflict.md
    - Пространственная экология и миграционные коридоры: ecology/spatial_ecology_corridors.md
  - Словарь терминов: glossary.md
  - Библиография: bibliography.md
